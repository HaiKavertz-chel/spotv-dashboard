<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOTV CEO Dashboard v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sw:210px;
  --nav:#16161a;--nav-t:rgba(255,255,255,0.45);
  --acc:#6C5CE7;--acc-bg:rgba(108,92,231,0.12);
  --bg:#f5f5f2;--sur:#fff;--bdr:rgba(0,0,0,0.08);
  --tx:#1a1a1a;--mt:#888884;--ht:#b0aea8;
  --up:#16a34a;--dn:#dc2626;--wn:#b45309;
  --up-bg:#f0fdf4;--dn-bg:#fef2f2;--wn-bg:#fffbeb;
  --bc:#0F6E56;--bc-l:#E1F5EE;
  --dg:#185FA5;--dg-l:#E6F1FB;
}
body{font-family:'Noto Sans KR',sans-serif;font-size:13px;background:var(--bg);color:var(--tx);display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:var(--sw);flex-shrink:0;background:var(--nav);display:flex;flex-direction:column}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:9px}
.sb-mk{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.sb-nm{font-size:13px;font-weight:600;color:#fff}
.sb-sb{font-size:10px;color:var(--nav-t);margin-top:1px}
.sb-sec{padding:14px 16px 4px;font-size:9px;font-weight:600;letter-spacing:.8px;color:rgba(255,255,255,0.22);text-transform:uppercase}
.nav-i{display:flex;align-items:center;gap:9px;padding:9px 12px;margin:1px 8px;border-radius:8px;cursor:pointer;color:var(--nav-t);font-size:12.5px;transition:all .1s;position:relative}
.nav-i:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8)}
.nav-i.on{background:var(--acc-bg);color:#fff}
.nav-i.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--acc);border-radius:0 2px 2px 0}
.nd{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.18);flex-shrink:0}
.nav-i.on .nd{background:var(--acc)}
.nb{margin-left:auto;background:var(--acc);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-bot{margin-top:auto;padding:14px;border-top:1px solid rgba(255,255,255,0.06)}
.sb-today{background:rgba(255,255,255,0.05);border-radius:8px;padding:10px 12px}
.sb-today .l{font-size:9px;color:var(--nav-t);margin-bottom:2px}
.sb-today .v{font-size:19px;font-weight:600;color:#fff;line-height:1}
.sb-today .d{font-size:10px;color:var(--nav-t);margin-top:3px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:50px;padding:0 24px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pg-t{font-size:15px;font-weight:600;letter-spacing:-.3px}
.tb-r{display:flex;align-items:center;gap:10px}
.tb-st{font-size:11px;color:var(--mt)}
.tb-btn{font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid var(--bdr);background:none;cursor:pointer;color:var(--mt);font-family:inherit;transition:background .1s}
.tb-btn:hover{background:var(--bg)}
.content{flex:1;overflow-y:auto;padding:20px 24px 40px}
.sec{display:none}.sec.on{display:block}

/* ── 로딩/에러 ── */
.load-box{display:flex;align-items:center;justify-content:center;padding:60px 20px;flex-direction:column;gap:12px}
.sp-lg{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-t{font-size:13px;color:var(--mt)}
.err-box{background:var(--dn-bg);border:1px solid #fecaca;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:12px;color:var(--dn);line-height:1.6}
.err-box strong{font-weight:600;display:block;margin-bottom:4px}

/* ── ALERTS ── */
.alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;font-size:12px;border-left:3px solid transparent}
.al-w{background:var(--wn-bg);border-color:#f59e0b;color:#92400e}
.al-g{background:var(--up-bg);border-color:#22c55e;color:#166534}
.al-i{background:#eff6ff;border-color:#3b82f6;color:#1e40af}
.alert strong{font-weight:600}
.al-tm{margin-left:auto;font-size:10px;opacity:.7;flex-shrink:0;padding-top:1px}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:15px}
.kpi-l{font-size:11px;color:var(--mt);margin-bottom:7px}
.kpi-v{font-size:24px;font-weight:600;letter-spacing:-1px;line-height:1}
.kpi-d{font-size:11px;margin-top:5px}
.kpi-d.up{color:var(--up)}.kpi-d.dn{color:var(--dn)}.kpi-d.wn{color:var(--wn)}
.kpi-bar{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-top:8px}
.kpi-fill{height:4px;border-radius:2px;transition:width .8s}
.f-ac{background:var(--acc)}.f-g{background:var(--up)}.f-w{background:#f59e0b}.f-r{background:var(--dn)}
.f-bc{background:var(--bc)}.f-dg{background:var(--dg)}

/* ── CARDS ── */
.two-col{display:grid;grid-template-columns:3fr 2fr;gap:10px;margin-bottom:14px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:15px;margin-bottom:14px}
.card:last-child{margin-bottom:0}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.card-t{font-size:11px;font-weight:600;color:var(--mt);text-transform:uppercase;letter-spacing:.5px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

/* ── 방송/디지털 분리 카드 ── */
.ad-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.split-card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:15px}
.split-card.bc-card{border-top:3px solid var(--bc)}
.split-card.dg-card{border-top:3px solid var(--dg)}
.split-title{font-size:12px;font-weight:600;margin-bottom:12px}
.split-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sk{background:var(--bg);border-radius:8px;padding:10px}
.sk-l{font-size:10px;color:var(--mt);margin-bottom:4px}
.sk-v{font-size:16px;font-weight:600;letter-spacing:-.5px}

/* ── 누계 카드 ── */
.cum-card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:15px;margin-bottom:14px;border-top:3px solid var(--acc)}
.cum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.ck{text-align:center;padding:12px 8px;background:var(--bg);border-radius:8px}
.ck-l{font-size:10px;color:var(--mt);margin-bottom:5px}
.ck-v{font-size:20px;font-weight:600;letter-spacing:-.5px}
.ck-s{font-size:11px;color:var(--mt);margin-top:3px}

/* ── 진행바 ── */
.prog-wrap{margin-top:14px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.prog-bar{height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;display:flex}
.prog-fill{height:8px;transition:width .8s}
.prog-bar-sm{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill-sm{height:4px;border-radius:2px;transition:width .8s}

/* ── 미팅 ── */
.mtg-list{display:flex;flex-direction:column}
.mtg-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.mtg-row:last-child{border-bottom:none}
.mtg-co{font-weight:500;min-width:76px;flex-shrink:0}
.mtg-desc{color:var(--mt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;flex-shrink:0}
.b-done{background:#dcfce7;color:#166534}.b-prog{background:#dbeafe;color:#1d4ed8}
.b-pend{background:#fef9c3;color:#854d0e}.b-miss{background:#fee2e2;color:#991b1b}
.b-canc{background:#f3f4f6;color:#374151}
.b-bc{background:var(--bc-l);color:var(--bc)}.b-dg{background:var(--dg-l);color:var(--dg)}

/* ── 테이블 ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:500;font-size:11px;color:var(--mt);border-bottom:1px solid var(--bdr)}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl-wrap{overflow-x:auto}
.td-r{text-align:right}.td-c{text-align:center}

/* ── 로그 ── */
.log-card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:13px 15px;margin-bottom:10px;transition:border-color .12s}
.log-card:hover{border-color:rgba(108,92,231,.4)}
.log-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
.log-dept{font-size:10px;font-weight:600;background:var(--acc-bg);color:var(--acc);padding:2px 8px;border-radius:10px}
.log-date{font-size:10px;color:var(--mt)}
.log-title{font-size:13px;font-weight:500;margin-bottom:3px;cursor:pointer}
.log-preview{font-size:11px;color:var(--mt);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.log-body{font-size:12px;color:var(--mt);line-height:1.7;margin-top:10px;white-space:pre-wrap;border-top:1px solid var(--bdr);padding-top:10px;display:none}
.log-body.open{display:block}
.log-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.log-tog{font-size:11px;color:var(--mt);cursor:pointer}
.ai-btn{font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid var(--bdr);background:none;cursor:pointer;color:var(--acc);font-family:inherit;transition:background .1s}
.ai-btn:hover{background:var(--acc-bg)}
.ai-btn:disabled{opacity:.5;pointer-events:none}
.sum-box{background:var(--acc-bg);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;padding:9px 12px;margin-top:8px;font-size:12px;line-height:1.7}
.sp-sm{display:inline-block;width:11px;height:11px;border:2px solid rgba(108,92,231,.2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}

@media(max-width:900px){.kpi-grid,.ad-split,.cum-row{grid-template-columns:repeat(2,1fr)}.two-col,.sub-grid{grid-template-columns:1fr}}
@media(max-width:600px){:root{--sw:0px}.sb{display:none}.kpi-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sb">
  <div class="sb-logo">
    <div class="sb-mk">S</div>
    <div><div class="sb-nm">SPOTV</div><div class="sb-sb">CEO Dashboard</div></div>
  </div>
  <div class="sb-sec">Overview</div>
  <div class="nav-i on" onclick="nav(this,'home')"><span class="nd"></span>오늘 현황</div>
  <div class="sb-sec">서비스</div>
  <div class="nav-i" onclick="nav(this,'now')"><span class="nd"></span>NOW 구독자</div>
  <div class="nav-i" onclick="nav(this,'prime')"><span class="nd"></span>Prime 구독자</div>
  <div class="sb-sec">광고</div>
  <div class="nav-i" onclick="nav(this,'ad')"><span class="nd"></span>광고센터 KPI</div>
  <div class="sb-sec">운영</div>
  <div class="nav-i" onclick="nav(this,'log')"><span class="nd"></span>업무일지·회의록<span class="nb" id="log-badge">-</span></div>
  <div class="sb-bot">
    <div class="sb-today">
      <div class="l">오늘</div>
      <div class="v" id="side-date"></div>
      <div class="d" id="side-day"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="pg-t" id="pg-title">오늘 현황</div>
    <div class="tb-r">
      <span class="tb-st" id="tb-st">로딩 중...</span>
      <button class="tb-btn" onclick="loadAll()">↻ 새로고침</button>
    </div>
  </div>
  <div class="content">
    <div id="home" class="sec on"><div class="load-box"><div class="sp-lg"></div><div class="load-t">데이터 불러오는 중...</div></div></div>
    <div id="now"  class="sec"><div class="load-box"><div class="sp-lg"></div><div class="load-t">NOW 구독자 로딩 중...</div></div></div>
    <div id="prime" class="sec"><div class="load-box"><div class="sp-lg"></div><div class="load-t">Prime 구독자 로딩 중...</div></div></div>
    <div id="ad"   class="sec"><div class="load-box"><div class="sp-lg"></div><div class="load-t">광고센터 로딩 중...</div></div></div>
    <div id="log"  class="sec"><div class="load-box"><div class="sp-lg"></div><div class="load-t">업무일지 로딩 중...</div></div></div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  시트 ID (변경 금지)
// ════════════════════════════════════════
const SID = {
  now:   '1dRwKy7yWxbpqUUeMykWcF5zlHXzV9OzTpmbGIM0eq-c',
  prime: '1QZaayfjaw1orIojZwtQ1ewV2HPjbPV6tVYDIvY7fizI',
  ad:    '1hCJN9YoSBKu8FDeMHzBvoj31f2DYjsqXGVTtanaH2U0',
  log:   '1IBCkmzGkG7IRMxoTdHdcp4x72Rv4H85oHguWiGVJvrI'
};

// ════════════════════════════════════════
//  탭 이름 매핑
//  탭1: 영업미팅일지  (A=날짜 B=업체 C=담당 D=내용 E=결과 F=광고구분★ G=계약금액 H=다음액션 I=후속일정)
//  탭2: 월간목표수익  (A=연월 B=방송목표 C=방송실적★SUMIFS D=방송달성률 E=방송전월비
//                      F=디지털목표 G=디지털실적★SUMIFS H=디지털달성률 I=디지털전월비
//                      J=총목표 K=총실적 L=총달성률
//                      M=연간목표 N=방송누계실적 O=디지털누계실적 P=연간달성률)
// ════════════════════════════════════════
const TAB = {
  mtg:  '영업미팅일지',
  goal: '월간목표수익',
  now:  '일별현황',
  log:  '업무일지'
};

const pages = {home:'오늘 현황',now:'NOW 구독자',prime:'Prime 구독자',ad:'광고센터 KPI',log:'업무일지·회의록'};
const DAYS  = ['일','월','화','수','목','금','토'];
const TODAY = new Date();

document.getElementById('side-date').textContent = (TODAY.getMonth()+1)+'/'+(TODAY.getDate());
document.getElementById('side-day').textContent  = DAYS[TODAY.getDay()]+'요일';

function nav(el, id){
  document.querySelectorAll('.nav-i').forEach(n=>n.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.getElementById('pg-title').textContent = pages[id];
}

// ════════════════════════════════════════
//  구글 시트 fetch
// ════════════════════════════════════════
const _cache = {};
async function fetchSheet(sid, tab){
  const k = sid + tab;
  if(_cache[k]) return _cache[k];
  const url = `https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows.map(r => r.c.map(c => c ? c.v : null));
  _cache[k] = rows;
  return rows;
}

// ════════════════════════════════════════
//  포맷 헬퍼
// ════════════════════════════════════════
const fmt    = n => (!n && n!==0) ? '-' : Number(n).toLocaleString();
const fmtM   = n => { if(!n && n!==0) return '-'; n=Number(n); if(n>=100000000) return (n/100000000).toFixed(1)+'억'; if(n>=10000) return Math.round(n/10000)+'만'; return n.toLocaleString(); };
const fmtD   = n => { if(!n && n!==0) return '-'; return (n>0?'▲ +':'▼ ')+Number(n).toLocaleString(); };
const fmtPct = n => { if(!n && n!==0) return '-'; const v=Number(n); return (v>1 ? Math.round(v) : Math.round(v*100))+'%'; };
const clamp  = v => Math.min(Math.max(Number(v)||0, 0), 100);
const pct    = (a,b) => !b ? 0 : Math.round(a/b*100);
const colorUp= v => (Number(v)||0) >= 0 ? 'up' : 'dn';
const badge  = v => {
  const m = {'계약완료':'b-done','협의중':'b-prog','대기':'b-pend','불발':'b-miss','취소':'b-canc'};
  return `<span class="badge ${m[v]||'b-pend'}">${v||'-'}</span>`;
};
const adBadge = v => {
  if(!v) return '';
  const cls = v==='방송' ? 'b-bc' : 'b-dg';
  return `<span class="badge ${cls}">${v}</span>`;
};

// ════════════════════════════════════════
//  데이터 저장소
// ════════════════════════════════════════
let nowData=[], primeData=[], adMtgData=[], adGoalData=[], logData=[];

// ════════════════════════════════════════
//  차트 관리
// ════════════════════════════════════════
const charts = {};
function mkChart(id, type, labels, datasets, opts={}){
  const el = document.getElementById(id); if(!el) return;
  if(charts[id]) charts[id].destroy();
  const gc='rgba(0,0,0,0.05)', tc='#aaa';
  charts[id] = new Chart(el, {
    type, data:{labels, datasets},
    options:{
      responsive:true,
      plugins:{legend:{display:!!opts.legend, labels:{color:tc,font:{size:11}}}},
      scales:{
        x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},
        y:{ticks:{color:tc,font:{size:10},callback:opts.yFmt||(v=>v)},grid:{color:gc}}
      }
    }
  });
}

// ════════════════════════════════════════
//  NOW 구독자
// ════════════════════════════════════════
async function loadNow(){
  const rows = await fetchSheet(SID.now, TAB.now);
  nowData = rows.slice(1).filter(r=>r[0]&&r[1]).map(r=>({
    date:String(r[0]), total:Number(r[1])||0, delta:Number(r[2])||0,
    newSub:Number(r[3])||0, cancel:Number(r[4])||0,
    goal:Number(r[5])||0, note:r[6]||''
  })).sort((a,b)=>a.date>b.date?1:-1);
}

// ════════════════════════════════════════
//  Prime 구독자
// ════════════════════════════════════════
async function loadPrime(){
  const rows = await fetchSheet(SID.prime, TAB.now);
  primeData = rows.slice(1).filter(r=>r[0]&&r[1]).map(r=>({
    date:String(r[0]), total:Number(r[1])||0, delta:Number(r[2])||0,
    newSub:Number(r[3])||0, cancel:Number(r[4])||0,
    goal:Number(r[5])||0, note:r[7]||''
  })).sort((a,b)=>a.date>b.date?1:-1);
}

// ════════════════════════════════════════
//  광고센터
//  탭1 컬럼: A=날짜 B=업체 C=담당 D=내용 E=결과 F=광고구분 G=계약금액 H=다음액션 I=후속일정
//  탭2 컬럼: A=연월 B=방송목표 C=방송실적 D=방송달성률 E=방송전월비
//            F=디지털목표 G=디지털실적 H=디지털달성률 I=디지털전월비
//            J=총목표 K=총실적 L=총달성률
//            M=연간목표 N=방송누계실적 O=디지털누계실적 P=연간달성률
// ════════════════════════════════════════
async function loadAd(){
  const [mtgRows, goalRows] = await Promise.all([
    fetchSheet(SID.ad, TAB.mtg),
    fetchSheet(SID.ad, TAB.goal)
  ]);

  // 탭1 파싱 — F열(광고구분) 추가, G열(계약금액)
  adMtgData = mtgRows.slice(1).filter(r=>r[0]&&r[1]).map(r=>({
    date:    String(r[0]||''),
    company: r[1]||'',
    manager: r[2]||'',
    summary: r[3]||'',
    result:  r[4]||'',
    adType:  r[5]||'',      // F열: 광고구분 (방송/디지털)
    amount:  Number(r[6])||0, // G열: 계약금액
    nextAction: r[7]||'',
    nextDate:   String(r[8]||'')
  })).sort((a,b)=>a.date>b.date?-1:1);

  // 탭2 파싱
  adGoalData = goalRows.slice(1).filter(r=>r[0]).map(r=>({
    ym:          String(r[0]||''),
    bcTarget:    Number(r[1])||0,   // B: 방송 목표
    bcActual:    Number(r[2])||0,   // C: 방송 실적 (SUMIFS 자동값)
    bcRate:      Number(r[3])||0,   // D: 방송 달성률
    bcMoM:       Number(r[4])||0,   // E: 방송 전월비
    dgTarget:    Number(r[5])||0,   // F: 디지털 목표
    dgActual:    Number(r[6])||0,   // G: 디지털 실적 (SUMIFS 자동값)
    dgRate:      Number(r[7])||0,   // H: 디지털 달성률
    dgMoM:       Number(r[8])||0,   // I: 디지털 전월비
    totTarget:   Number(r[9])||0,   // J: 총 목표
    totActual:   Number(r[10])||0,  // K: 총 실적
    totRate:     Number(r[11])||0,  // L: 총 달성률
    annualTarget:Number(r[12])||0,  // M: 연간 목표
    bcCum:       Number(r[13])||0,  // N: 방송 누계실적
    dgCum:       Number(r[14])||0,  // O: 디지털 누계실적
    annualRate:  Number(r[15])||0   // P: 연간 달성률
  })).sort((a,b)=>a.ym>b.ym?1:-1);
}

// ════════════════════════════════════════
//  업무일지
// ════════════════════════════════════════
async function loadLog(){
  const rows = await fetchSheet(SID.log, TAB.log);
  logData = rows.slice(1).filter(r=>r[0]&&r[3]).map(r=>({
    date:String(r[0]||''), dept:r[1]||'', type:r[2]||'',
    title:r[3]||'', body:r[4]||'', author:r[5]||'', summary:null
  })).sort((a,b)=>a.date>b.date?-1:1);
  document.getElementById('log-badge').textContent = logData.length;
}

      <canvas id="adChart" height="130"></canvas>
    </div>

    <!-- 월간 소계 테이블 -->
    <div class="card">
      <div class="card-hd"><span class="card-t">월간 목표·실적 상세</span></div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr>
          <th>연월</th>
          <th class="td-r" style="color:var(--bc)">방송 목표</th>
          <th class="td-r" style="color:var(--bc)">방송 실적</th>
          <th class="td-r" style="color:var(--bc)">달성률</th>
          <th class="td-r" style="color:var(--dg)">디지털 목표</th>
          <th class="td-r" style="color:var(--dg)">디지털 실적</th>
          <th class="td-r" style="color:var(--dg)">달성률</th>
          <th class="td-r">소계 목표</th>
          <th class="td-r">소계 실적</th>
          <th class="td-r">소계 달성률</th>
        </tr></thead>
        <tbody>
          ${[...adGoalData].reverse().map(r=>`<tr>
            <td style="color:#185FA5;font-weight:500">${r.ym}</td>
            <td class="td-r">${fmtM(r.bcTarget)}</td>
            <td class="td-r" style="font-weight:600">${fmtM(r.bcActual)}</td>
            <td class="td-r" style="font-weight:600;color:${(r.bcRate||0)>=0.8?'var(--up)':'var(--dn)'}">${fmtPct(r.bcRate)}</td>
            <td class="td-r">${fmtM(r.dgTarget)}</td>
            <td class="td-r" style="font-weight:600">${fmtM(r.dgActual)}</td>
            <td class="td-r" style="font-weight:600;color:${(r.dgRate||0)>=0.8?'var(--up)':'var(--dn)'}">${fmtPct(r.dgRate)}</td>
            <td class="td-r" style="font-weight:600">${fmtM(r.totTarget)}</td>
            <td class="td-r" style="font-weight:700">${fmtM(r.totActual)}</td>
            <td class="td-r" style="font-weight:700;color:${(r.totRate||0)>=0.8?'var(--up)':'var(--dn)'}">${fmtPct(r.totRate)}</td>
          </tr>`).join('') || '<tr><td colspan="10" style="text-align:center;padding:20px;color:var(--mt)">데이터 없음</td></tr>'}
        </tbody>
      </table></div>
    </div>

    <!-- 영업 미팅 전체 -->
    <div class="card">
      <div class="card-hd"><span class="card-t">영업 미팅 전체 목록</span></div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr>
          <th>날짜</th><th>업체</th><th>담당자</th><th>내용</th>
          <th class="td-c">구분</th><th class="td-c">결과</th>
          <th class="td-r">금액</th><th>후속일정</th>
        </tr></thead>
        <tbody>
          ${adMtgData.map(r=>`<tr>
            <td style="color:#185FA5;white-space:nowrap">${r.date}</td>
            <td style="font-weight:500">${r.company}</td>
            <td style="color:var(--mt)">${r.manager}</td>
            <td style="color:var(--mt);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.summary}</td>
            <td class="td-c">${adBadge(r.adType)}</td>
            <td class="td-c">${badge(r.result)}</td>
            <td class="td-r" style="font-weight:500">${r.amount ? fmtM(r.amount) : '-'}</td>
            <td style="color:var(--mt);white-space:nowrap">${r.nextDate||'-'}</td>
          </tr>`).join('') || '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--mt)">데이터 없음</td></tr>'}
        </tbody>
      </table></div>
    </div>`;

  setTimeout(()=>{
    mkChart('adChart','bar',
      prev5.map(r=>r.ym),
      [
        {label:'방송 실적',  data:prev5.map(r=>r.bcActual/100000000), backgroundColor:'#0F6E56bb', borderRadius:3},
        {label:'디지털 실적',data:prev5.map(r=>r.dgActual/100000000), backgroundColor:'#185FA5bb', borderRadius:3}
      ],
      {legend:true, yFmt:v=>v.toFixed(1)+'억'}
    );
  },50);
}

// ════════════════════════════════════════
//  업무일지 렌더
// ════════════════════════════════════════
function renderLog(){
  document.getElementById('log').innerHTML = logData.length
    ? logData.map((l,i)=>`
        <div class="log-card">
          <div class="log-top">
            <span class="log-dept">${l.dept}</span>
            <span style="display:flex;align-items:center;gap:8px">
              <span class="badge ${l.type==='회의록'?'b-miss':'b-prog'}">${l.type}</span>
              <span class="log-date">${l.date} · ${l.author}</span>
            </span>
          </div>
          <div class="log-title" onclick="toggleLog(${i})">${l.title}</div>
          <div class="log-preview">${(l.body||'').replace(/\n/g,' ')}</div>
          <div class="log-body" id="lb-${i}">${l.body||''}</div>
          <div class="log-foot">
            <span class="log-tog" onclick="toggleLog(${i})">▾ 전체 보기</span>
            <button class="ai-btn" id="ab-${i}" onclick="doSum(${i})">✦ AI 요약</button>
          </div>
          <div id="sb-${i}"></div>
        </div>`).join('')
    : '<div class="load-box"><div class="load-t">업무일지 데이터가 없습니다</div></div>';
}

function toggleLog(i){ document.getElementById('lb-'+i).classList.toggle('open'); }

async function doSum(i){
  const btn=document.getElementById('ab-'+i), box=document.getElementById('sb-'+i), l=logData[i];
  if(l.summary){ box.innerHTML=`<div class="sum-box">${l.summary}</div>`; return; }
  document.getElementById('lb-'+i).classList.add('open');
  btn.innerHTML='<span class="sp-sm"></span> 요약 중...'; btn.disabled=true;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:800,
        system:'경영진 보고용 요약. 핵심 2줄, ⚠️ 이슈, ✅ 완료, 📌 후속 액션 순서로 간결하게.',
        messages:[{role:'user', content:`${l.type} 요약\n제목: ${l.title}\n부서: ${l.dept}\n\n${l.body}`}]
      })
    });
    const d = await res.json();
    const t = d.content.map(c=>c.text||'').join('');
    l.summary = t.replace(/\n/g,'<br>');
    box.innerHTML = `<div class="sum-box">${l.summary}</div>`;
    btn.innerHTML = '✓ 요약됨';
  } catch(e){
    box.innerHTML = `<div class="sum-box" style="color:var(--dn)">요약 실패. 다시 시도해주세요.</div>`;
    btn.innerHTML = '✦ AI 요약'; btn.disabled=false;
  }
}

// ════════════════════════════════════════
//  전체 로드
// ════════════════════════════════════════
async function loadAll(){
  document.getElementById('tb-st').textContent = '로딩 중...';
  ['home','now','prime','ad','log'].forEach(id=>{
    document.getElementById(id).innerHTML =
      `<div class="load-box"><div class="sp-lg"></div><div class="load-t">데이터 불러오는 중...</div></div>`;
  });

  const errs = [];
  const run  = async (fn, name) => { try{ await fn(); } catch(e){ errs.push(name+': '+e.message); } };

  await Promise.all([
    run(loadNow,   'NOW 구독자'),
    run(loadPrime, 'Prime 구독자'),
    run(loadAd,    '광고센터'),
    run(loadLog,   '업무일지')
  ]);

  const errHTML = errs.length
    ? `<div class="err-box"><strong>⚠ 일부 시트 로드 실패 — 구글 시트 공유 권한(링크 있는 모든 사용자·뷰어)을 확인하세요</strong><ul style="margin-top:6px;padding-left:16px">${errs.map(e=>`<li>${e}</li>`).join('')}</ul></div>`
    : '';

  renderHome(); renderNow(); renderPrime(); renderAd(); renderLog();

  if(errHTML) document.getElementById('home').innerHTML = errHTML + document.getElementById('home').innerHTML;

  const t = new Date();
  document.getElementById('tb-st').textContent = `${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')} 업데이트`;
}

loadAll();
</script>
