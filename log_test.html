<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>업무일지 테스트</title>
<style>
body{font-family:sans-serif;padding:20px;font-size:13px}
.box{background:#f0f7ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px;margin-bottom:12px;white-space:pre-wrap;word-break:break-all;font-family:monospace;font-size:12px;line-height:1.7}
.card{background:#fff;border:1px solid #e4e4e0;border-radius:10px;padding:14px;margin-bottom:10px}
.dept{background:#EEEDFE;color:#3C3489;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block;margin-right:6px}
.title{font-size:14px;font-weight:600;margin:8px 0 4px}
.summary{background:rgba(108,92,231,0.1);border-left:3px solid #6C5CE7;padding:8px 12px;font-size:12px;line-height:1.7;border-radius:0 6px 6px 0;margin-top:6px}
.body-text{font-size:12px;color:#666;margin-top:8px;border-top:1px solid #eee;padding-top:8px;white-space:pre-wrap}
.err{color:#dc2626}
button{padding:8px 16px;background:#6C5CE7;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px}
</style>
</head>
<body>
<h2 style="margin-bottom:16px">업무일지 연동 테스트</h2>
<button onclick="load()">▶ 데이터 불러오기</button>
<div id="out" style="margin-top:16px"></div>

<script>
const SID = '1IBCkmzGkG7IRMxoTdHdcp4x72Rv4H85oHguWiGVJvrI';
const TAB = '업무일지';

async function load(){
  const out = document.getElementById('out');
  out.innerHTML = '<p>로딩 중...</p>';

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(TAB)}&t=${Date.now()}`;
    const res  = await fetch(url, {cache:'no-store'});
    const text = await res.text();

    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!match){ out.innerHTML = '<div class="box err">응답 파싱 실패:\n'+text.slice(0,300)+'</div>'; return; }

    const json = JSON.parse(match[1]);
    const table = json.table;

    // ── 1. 원본 데이터 표시 ──
    let html = `<div class="box">✅ 응답 성공\n컬럼 수: ${table.cols.length}개\n행 수: ${table.rows.length}개\n\n컬럼 목록:\n`;
    table.cols.forEach((c,i) => { html += `  [${i}] id:${c.id} label:"${c.label}" type:${c.type}\n`; });
    html += '\n첫 번째 행 raw:\n';
    if(table.rows[0]){
      table.rows[0].c.forEach((c,i) => { html += `  [${i}]: ${JSON.stringify(c)}\n`; });
    }
    html += '</div>';

    // ── 2. 날짜 파싱 ──
    function parseDate(v){
      if(!v) return '';
      const s = String(v);
      const m = s.match(/Date\((\d+),(\d+),(\d+)\)/);
      if(m) return `${m[1]}-${String(Number(m[2])+1).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
      if(typeof v === 'number') {
        const d = new Date((v-25569)*86400*1000);
        return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
      }
      return s;
    }

    // ── 3. 데이터 파싱 (컬럼 순서 자동 감지) ──
    const colMap = {};
    table.cols.forEach((c,i) => { colMap[c.label.trim()] = i; });

    html += `<div class="box">컬럼 매핑:\n${JSON.stringify(colMap, null, 2)}</div>`;

    // 컬럼 인덱스 자동 매핑
    const iDate    = colMap['날짜']    ?? 0;
    const iDept    = colMap['부서']    ?? 1;
    const iType    = colMap['종류']    ?? 2;
    const iTitle   = colMap['제목']    ?? 3;
    const iBody    = colMap['내용']    ?? 4;
    const iSummary = colMap['AI 요약'] ?? colMap['AI요약'] ?? colMap['요약'] ?? 5;

    html += `<div class="box">사용 인덱스:\n날짜:${iDate} 부서:${iDept} 종류:${iType} 제목:${iTitle} 내용:${iBody} 요약:${iSummary}</div>`;

    const safeStr = v => (v===null||v===undefined) ? '' : String(v);

    const items = table.rows
      .filter(r => r.c[iTitle] && safeStr(r.c[iTitle].v).trim() !== '')
      .map(r => ({
        date:    parseDate(r.c[iDate]?.v),
        dept:    safeStr(r.c[iDept]?.v),
        type:    safeStr(r.c[iType]?.v),
        title:   safeStr(r.c[iTitle]?.v),
        body:    safeStr(r.c[iBody]?.v),
        summary: safeStr(r.c[iSummary]?.v),
      }))
      .sort((a,b) => a.date > b.date ? -1 : 1);

    html += `<div class="box">파싱된 항목 수: ${items.length}개</div>`;

    if(items.length === 0){
      html += '<div class="box err">⚠ 파싱된 데이터 없음\n제목 컬럼이 비어있거나 컬럼 매핑이 잘못됐을 수 있어요</div>';
    } else {
      items.forEach(l => {
        html += `<div class="card">
          <div><span class="dept">${l.dept||'부서없음'}</span><span style="font-size:10px;color:#888">${l.type}</span><span style="font-size:10px;color:#aaa;margin-left:8px">${l.date}</span></div>
          <div class="title">${l.title}</div>
          ${l.summary ? `<div class="summary"><strong style="font-size:10px;color:#6C5CE7">✦ AI 요약</strong><br>${l.summary.replace(/\n/g,'<br>')}</div>` : '<div style="font-size:11px;color:#aaa;margin-top:4px">요약 없음</div>'}
          ${l.body ? `<div class="body-text">${l.body.slice(0,200)}${l.body.length>200?'...':''}</div>` : ''}
        </div>`;
      });
    }

    out.innerHTML = html;

  } catch(e) {
    document.getElementById('out').innerHTML = `<div class="box err">오류: ${e.message}\n${e.stack}</div>`;
  }
}
</script>
</body>
</html>
